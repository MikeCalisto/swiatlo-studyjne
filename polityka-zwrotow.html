<!DOCTYPE html>
<html lang="pl">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0" />
  <title>Polityka Zwrotów — ŚWIATŁO STUDYJNE</title>
  <link rel="preconnect" href="https://fonts.googleapis.com" />
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
  <link href="https://fonts.googleapis.com/css2?family=Playfair+Display:ital,wght@0,700;0,800;0,900;1,700&family=Inter:wght@300;400;500;600;700&display=swap" rel="stylesheet" />
  <style>
    *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }
    :root {
      --black: #0E0C0A;
      --cream: #F7F4EF;
      --amber: #C8973B;
      --gray: #5E5B57;
      --border: rgba(14,12,10,0.12);
      --mobile-width: 430px;
    }
    body {
      font-family: 'Inter', sans-serif;
      background: var(--cream);
      color: var(--black);
      min-height: 100vh;
    }
    .page-wrapper {
      max-width: var(--mobile-width);
      margin: 0 auto;
      background: var(--cream);
      min-height: 100vh;
    }
    .sub-header {
      background: var(--black);
      padding: 20px 24px;
      display: flex;
      align-items: center;
      justify-content: space-between;
    }
    .sub-logo {
      font-family: 'Playfair Display', serif;
      font-size: 14px;
      font-weight: 800;
      color: #fff;
      letter-spacing: 2px;
      text-decoration: none;
    }
    .sub-back {
      font-size: 10px;
      font-weight: 600;
      letter-spacing: 2px;
      text-transform: uppercase;
      color: var(--amber);
      text-decoration: none;
    }
    .sub-content {
      padding: 48px 24px 64px;
    }
    .sub-overline {
      font-size: 10px;
      font-weight: 600;
      letter-spacing: 3px;
      text-transform: uppercase;
      color: var(--amber);
      margin-bottom: 12px;
    }
    .sub-title {
      font-family: 'Playfair Display', serif;
      font-size: 32px;
      font-weight: 800;
      color: var(--black);
      line-height: 1.15;
      margin-bottom: 40px;
    }
    .sub-section { margin-bottom: 32px; }
    .sub-section h2 {
      font-size: 13px;
      font-weight: 700;
      letter-spacing: 1px;
      text-transform: uppercase;
      color: var(--black);
      margin-bottom: 12px;
      padding-bottom: 10px;
      border-bottom: 1px solid var(--border);
    }
    .sub-section p {
      font-size: 13px;
      color: var(--gray);
      line-height: 1.75;
      margin-bottom: 10px;
    }
    .sub-section ul {
      padding-left: 0;
      list-style: none;
    }
    .sub-section ul li {
      font-size: 13px;
      color: var(--gray);
      line-height: 1.75;
      padding: 6px 0;
      padding-left: 16px;
      position: relative;
    }
    .sub-section ul li::before {
      content: '—';
      position: absolute;
      left: 0;
      color: var(--amber);
    }
    .sub-footer {
      background: var(--black);
      padding: 28px 24px;
      text-align: center;
      font-size: 10px;
      color: rgba(247,244,239,0.25);
      letter-spacing: 1px;
    }
    .placeholder-box {
      border: 1px dashed var(--border);
      padding: 40px 24px;
      text-align: center;
      color: var(--gray);
      font-size: 13px;
      line-height: 1.7;
    }
  </style>
</head>
<body>
<div class="page-wrapper">

  <header class="sub-header">
    <a href="index.html" class="sub-logo">ŚWIATŁO STUDYJNE</a>
    <a href="index.html" class="sub-back">← Wróć</a>
  </header>

  <div class="sub-content">
    <div class="sub-overline">dokument prawny</div>
    <h1 class="sub-title">Polityka<br>Zwrotów</h1>

    <div class="placeholder-box">
      Treść polityki zwrotów zostanie dodana wkrótce.
    </div>
  </div>

  <footer class="sub-footer">
    © ŚWIATŁO STUDYJNE · Roman Prokopov
  </footer>

</div>
</body>
</html>
